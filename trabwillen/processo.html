<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compra Realizada — TRABWILLEN</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="assets/favicon/site.webmanifest" />
  <meta name="theme-color" content="#c0587a" />

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/processo.css" />
</head>
<body>

<div class="sucesso-card">

  <div class="icone">✅</div>

  <h1>Compra realizada com sucesso!</h1>

  <p>Obrigado por comprar na <strong>Trabwillen</strong>. Você receberá novidades sobre o preparo da sua peça pelo WhatsApp informado.</p>

  <div class="dados">

    <div class="linha">
      <span>Pedido</span>
      <strong id="pedidoNumero"></strong>
    </div>

    <div class="linha">
      <span>Cliente</span>
      <strong id="cliente"></strong>
    </div>

    <div class="linha">
      <span>Pagamento</span>
      <strong id="pagamento"></strong>
    </div>

    <div class="linha">
      <span>Total</span>
      <strong id="total"></strong>
    </div>

    <div class="linha">
      <span>Data</span>
      <strong id="data"></strong>
    </div>

    <div class="linha">
      <span>Entrega</span>
      <strong id="endereco"></strong>
    </div>

  </div>

  <div class="botoes">
    <button class="btn-primario" onclick="voltarLoja()">Continuar Comprando</button>
    <a class="btn-secundario" href="perfil.html">Ver meus pedidos</a>
  </div>

</div>

<script src="js/processo.js"></script>

</body>
</html>
