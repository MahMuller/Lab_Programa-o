<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finalizar Compra — TRABWILLEN</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="assets/favicon/site.webmanifest" />
  <meta name="theme-color" content="#c0587a" />

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/checkout.css" />
</head>
<body>

<!-- Cabeçalho simplificado da etapa de checkout -->
<header>
  <a href="index.html" class="logo">Trabwillen</a>
  <div class="checkout-steps">
    <span class="step done">1. Carrinho</span>
    <span class="step-sep">›</span>
    <span class="step ativo">2. Entrega e pagamento</span>
    <span class="step-sep">›</span>
    <span class="step">3. Confirmação</span>
  </div>
  <a href="index.html" class="btn-voltar-loja">← Voltar à loja</a>
</header>

<!-- Formulário de entrega e resumo do pedido -->
<div class="checkout-wrap">

  <div class="checkout-titulo">
    <h1>Finalizar compra</h1>
    <p>Confira seus dados de entrega e o resumo do pedido antes de confirmar.</p>
  </div>

  <div class="container">

    <div class="card">

      <h2>📦 Dados para entrega</h2>

      <div class="campo" id="campo-nome">
        <label>Nome completo</label>
        <input id="nome" placeholder="Maria da Silva" maxlength="60" autocomplete="name">
        <span class="erro-msg" id="erro-nome"></span>
      </div>

      <div class="campo" id="campo-telefone">
        <label>Telefone / WhatsApp</label>
        <input id="telefone" placeholder="(49) 9 9999-9999" inputmode="numeric" maxlength="15" autocomplete="tel">
        <span class="erro-msg" id="erro-telefone"></span>
      </div>

      <div class="linha-dupla">
        <div class="campo" id="campo-cep">
          <label>CEP</label>
          <div class="campo-cep-wrap">
            <input id="cep" placeholder="00000-000" inputmode="numeric" maxlength="9" autocomplete="postal-code">
            <span class="cep-status" id="cep-status"></span>
          </div>
          <span class="erro-msg" id="erro-cep"></span>
        </div>

        <div class="campo" id="campo-numero">
          <label>Número</label>
          <input id="numero" placeholder="123" maxlength="10" autocomplete="off">
          <span class="erro-msg" id="erro-numero"></span>
        </div>
      </div>

      <div class="campo" id="campo-endereco">
        <label>Endereço</label>
        <input id="endereco" placeholder="Rua, avenida..." maxlength="100" autocomplete="address-line1">
        <span class="erro-msg" id="erro-endereco"></span>
      </div>

      <div class="linha-dupla">
        <div class="campo" id="campo-bairro">
          <label>Bairro</label>
          <input id="bairro" placeholder="Centro" maxlength="50" autocomplete="address-line2">
          <span class="erro-msg" id="erro-bairro"></span>
        </div>

        <div class="campo" id="campo-cidade">
          <label>Cidade</label>
          <input id="cidade" placeholder="Lages" maxlength="50" autocomplete="address-level2">
          <span class="erro-msg" id="erro-cidade"></span>
        </div>
      </div>

      <div class="campo">
        <label>Forma de pagamento</label>
        <select id="pagamento">
          <option>PIX</option>
          <option>Cartão de Crédito</option>
          <option>Boleto</option>
        </select>
      </div>

    </div>

    <div class="card resumo-card">

      <h2>🧾 Resumo do pedido</h2>

      <div id="listaProdutos"></div>

      <div id="total"></div>

      <button id="btnConfirmar" onclick="confirmarCompra()">
        Confirmar Compra
      </button>

      <p class="seguranca">🔒 Seus dados são usados apenas para processar esta entrega.</p>

    </div>

  </div>

</div>

<!-- Notificação flutuante (toast) -->
<div class="toast" id="toast">
  <span id="toast-icon">✅</span>
  <span id="toast-msg">Mensagem</span>
</div>

<script src="js/checkout.js"></script>

</body>
</html>
